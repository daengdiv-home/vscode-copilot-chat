name: Build Copilot Proxy Extension

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'copilot-proxy-extension/**'
      - '.github/workflows/build-vsix.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: copilot-proxy-extension

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: copilot-proxy-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install VSCE
        run: npm install -g @vscode/vsce

      - name: Package Extension
        run: vsce package --no-dependencies --allow-missing-repository

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-proxy-extension
          path: copilot-proxy-extension/*.vsix
          retention-days: 30
